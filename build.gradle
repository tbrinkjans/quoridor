allprojects {
    group = 'de.quoridor'
    version = '1.0.0'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    tasks.withType(JavaCompile) {
        options.compilerArgs += [
            '-Xlint:all',
            '-Xlint:-this-escape',
            '-Xlint:-serial'
        ]
    }
}
